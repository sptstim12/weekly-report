# ==========================================
# AI 模型配置
# ==========================================
# 当前使用: DeepSeek
# 切换方法: 修改 provider 和 base_url，配置对应的 api_key_env 或 api_key
#
# 常用配置参考:
#
#   DeepSeek（当前）:
#     provider: deepseek
#     base_url: https://api.deepseek.com
#     model: deepseek-chat
#     api_key_env: DEEPSEEK_API_KEY
#
#   OpenAI:
#     provider: openai
#     base_url: https://api.openai.com/v1
#     model: gpt-4o
#     api_key_env: OPENAI_API_KEY
#
#   Gemini（通过 OpenAI 兼容接口）:
#     provider: gemini
#     base_url: https://generativelanguage.googleapis.com/v1beta/openai
#     model: gemini-2.5-flash
#     api_key_env: GEMINI_API_KEY
# ==========================================
ai:
  provider: "deepseek"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  api_key_env: "DEEPSEEK_API_KEY"
  # api_key: "sk-xxx"   # 也可以直接写 Key（不推荐，安全风险）

# ==========================================
# ETF 推荐功能（可选）
# ==========================================
# 开启后，每次分析会从全市场 ETF 中筛选候选池，
# 由 AI 推荐 3-5 只值得关注的 ETF
recommend:
  enabled: true

# ==========================================
# 报告设置
# ==========================================
report:
  keep_history: 7  # 保留最近 N 份历史报告
